name: Sync SFMC Email Content

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install httpx

      - name: Fetch SFMC emails
        env:
          SFMC_CLIENT_ID: ${{ secrets.SFMC_CLIENT_ID }}
          SFMC_CLIENT_SECRET: ${{ secrets.SFMC_CLIENT_SECRET }}
          SFMC_SUBDOMAIN: ${{ secrets.SFMC_SUBDOMAIN }}
        run: python scripts/sync_emails.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add email-content/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync SFMC email content $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
